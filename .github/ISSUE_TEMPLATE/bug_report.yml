name: Bug Report (Guided)
description: Report a bug, crash, or unexpected behavior in one of the Amulet utility plugins.
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: checkboxes
    attributes:
      label: Before reporting
      options:
        - label: I searched existing issues to make sure this was not already reported.
          required: true

        - label: I tested this with the latest available version of the plugin, if possible.
          required: false

  - type: dropdown
    attributes:
      label: Plugin
      description: Which plugin has the issue?
      options:
        - Auto Light
        - Blocks to Storage
        - Dark Mode UI
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the issue
      description: |
        What happened?

        Explain the problem clearly. Include what you were doing when the issue happened.
      placeholder: |
        Example:
        Auto Light crashed after I selected a region and clicked Run.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
        4.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: |
        Example:
        The plugin should have completed the operation without crashing.
    validations:
      required: true

  - type: input
    attributes:
      label: OS
      placeholder: "Windows 11"
    validations:
      required: true

  - type: input
    attributes:
      label: Amulet version
      placeholder: "0.10.44"
    validations:
      required: false

  - type: dropdown
    attributes:
      label: Minecraft edition
      options:
        - Bedrock Edition
        - Java Edition
        - Other / Not sure
    validations:
      required: true

  - type: input
    attributes:
      label: Minecraft version
      placeholder: "1.21.82"
    validations:
      required: false

  - type: input
    attributes:
      label: Plugin version / file name
      description: Enter the plugin version or exact file name you are using, if known.
      placeholder: "Auto_Light_v1-1-0-0.py"
    validations:
      required: false

  - type: input
    attributes:
      label: World type, if relevant
      placeholder: "Bedrock world, Realm download, converted world, flat world, large survival world"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Plugin settings and export report
      description: |
        List the settings related to the issue.

        For Blocks to Storage, reproduce the issue on the smallest practical selection and attach the saved export report.

        For item-frame issues, enable `Include item frame label audit in report`.

        Give the exact in-game coordinates of each incorrect or empty container or item frame. For an item frame, stand in the same block space as the frame when reading the coordinates, not one block in front of it.

        Explain what the report says was placed and what actually appeared in-game.

        For Dark Mode UI, include the Status or Scan UI log when the issue is about missing or incorrect UI styling.

        Enable other advanced diagnostics only when requested or clearly related to the issue. Remove any information you do not want to share.
      placeholder: |
        Example:
        One block type per storage group: On
        Item frames: On
        Include item frame label audit in report: On

        Item frame coordinates: x 120, y 64, z -35

        The report says the item was written successfully, but the frame was empty in-game.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Console errors, logs, or other useful files
      description: |
        Paste relevant console errors or logs here.

        Attach any useful `.BTSP` files or other diagnostic files.
      placeholder: |
        Paste console errors or logs here.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Screenshots or video
      description: |
        Optional.

        Attach screenshots or a short video showing the issue, coordinates, or incorrect in-game result.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional notes
      description: Anything else that may help reproduce, explain, or understand the issue.
    validations:
      required: false
