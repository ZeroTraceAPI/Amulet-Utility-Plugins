name: Bug Report (Guided)
description: Report a bug, crash, or unexpected behavior in one of the Amulet utility plugins.
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: checkboxes
    attributes:
      label: Before reporting
      options:
        - label: I searched existing issues to make sure this was not already reported.
          required: true

        - label: I tested this with the latest available version of the plugin, if possible.
          required: false

  - type: dropdown
    attributes:
      label: Plugin
      description: Which plugin has the issue?
      options:
        - Auto Light
        - Blocks to Storage
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the issue
      description: |
        What happened?

        Explain the problem clearly. Include what you were doing when the issue happened.
      placeholder: |
        Example:
        Auto Light crashed after I selected a region and clicked Run.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
        4.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: |
        Example:
        The plugin should have completed the operation without crashing.
    validations:
      required: true

  - type: input
    attributes:
      label: OS
      placeholder: "Windows 11"
    validations:
      required: true

  - type: input
    attributes:
      label: Amulet version
      placeholder: "0.10.44"
    validations:
      required: false

  - type: dropdown
    attributes:
      label: Minecraft edition
      options:
        - Bedrock Edition
        - Java Edition
        - Other / Not sure
    validations:
      required: true

  - type: input
    attributes:
      label: Minecraft version
      placeholder: "1.21.82"
    validations:
      required: false

  - type: input
    attributes:
      label: Plugin version / file name
      description: Enter the plugin version or exact file name you are using, if known.
      placeholder: "Auto_light_v1.py"
    validations:
      required: false

  - type: input
    attributes:
      label: World type, if relevant
      placeholder: "Bedrock world, Realm download, converted world, flat world, large survival world"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Console errors or logs
      description: Paste any relevant errors here.
      render: text
      placeholder: |
        Paste errors here.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Screenshots or video
      description: |
        Optional.

        Add screenshots or a video if it helps explain the issue.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional notes
      description: Anything else that may help reproduce, explain, or understand the issue.
    validations:
      required: false
